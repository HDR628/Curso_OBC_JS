~<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Page with React</title>

    <style>
      #app {
        background-color: bisque;
        display: grid;
        font-family: sans-serif;
        height: 100vh;
        place-content: center;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- Essa aula usa uma forma não recomendada de se trabalhar com o React apenas para introduzir a biblioteca e fazer isso de um modo mais simples. Durante todo o módulo usaremos o JSX, que hoje é forma recomenda de criar componentes React. -->

    <!-- Add react by cdn -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
      const { createElement } = React;
      const appDiv = document.getElementById("app");
      const root = ReactDOM.createRoot(appDiv);

      const h1 = createElement("h1", {}, "Olá, mundo");
      const p = createElement("p", {}, "Estamos usando React");
      const main = createElement("main", {}, h1, p);

      root.render(main);
    </script>
  </body>
</html>
